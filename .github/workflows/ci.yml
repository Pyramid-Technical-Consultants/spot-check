name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[fast]"

      - name: Install test tools
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests packaging

      - name: Byte-compile
        run: python -m compileall -q src/spot_check

      - name: Pytest
        run: pytest -q

  version-check:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(python -c "import pathlib, re; t=pathlib.Path('src/spot_check/_version.py').read_text(); print(re.search(r'__version__\\s*=\\s*[\"\\']([^\"\\']+)', t).group(1))")"
          echo "Tag: $TAG  Package: $VERSION"
          test "$TAG" = "$VERSION"
